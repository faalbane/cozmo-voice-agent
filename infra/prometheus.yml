global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "voice-agent"
    dns_sd_configs:
      - names:
          - "agent"
        type: A
        port: 9100
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: "livekit"
    static_configs:
      - targets: ["livekit-server:7880"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "dashboard"
    static_configs:
      - targets: ["dashboard:8080"]
    metrics_path: /metrics
    scrape_interval: 5s
