<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase — Talk to Agent</title>
<style>
:root { --bg:#0a0c10; --card:#171a22; --border:#252833; --text:#e4e7f0; --muted:#6b7089; --green:#22c55e; --red:#ef4444; --blue:#3b82f6; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { text-align:center; max-width:440px; padding:24px; }
h1 { font-size:22px; margin-bottom:8px; }
p { color:var(--muted); font-size:14px; margin-bottom:32px; line-height:1.6; }
.call-btn {
  width:120px; height:120px; border-radius:50%; border:none;
  font-size:40px; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 24px;
}
.call-btn.idle { background:var(--green); color:#fff; }
.call-btn.idle:hover { transform:scale(1.05); background:#16a34a; }
.call-btn.active { background:var(--red); color:#fff; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 20px rgba(239,68,68,0)} }
.status { font-size:14px; color:var(--muted); margin-bottom:16px; min-height:20px; }
.status.connected { color:var(--green); }
.status.error { color:var(--red); }
.ws-input {
  width:100%; padding:10px 14px; border-radius:8px;
  border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:13px; font-family:monospace;
  text-align:center; margin-bottom:12px; outline:none;
}
.ws-input:focus { border-color:var(--blue); }
.hint { font-size:11px; color:var(--muted); line-height:1.6; }
.transcript {
  margin-top:24px; padding:16px; background:var(--card);
  border:1px solid var(--border); border-radius:12px;
  text-align:left; min-height:100px; max-height:250px;
  overflow-y:auto; font-size:13px; line-height:1.6;
}
.t-line { margin-bottom:6px; }
.t-line .role { font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
.t-line .role.user { color:var(--blue); }
.t-line .role.bot { color:var(--green); }
</style>
</head>
<body>
<div class="container">
  <h1>ShopEase Voice Agent</h1>
  <p>Click the button to start a conversation with the AI support agent. Try asking about refund policies or say you want to cancel.</p>

  <input class="ws-input" id="ws-url" value="ws://localhost:8765" placeholder="WebSocket URL">

  <button class="call-btn idle" id="call-btn">&#128222;</button>

  <div class="status" id="status">Ready — click to start</div>

  <div class="transcript" id="transcript">
    <div style="color:var(--muted);text-align:center;">Conversation will appear here</div>
  </div>

  <div class="hint" style="margin-top:12px;">
    Uses your microphone. Start agent + client server:<br>
    <code style="color:var(--blue);">python run_client.py</code>
  </div>
</div>

<script type="module" src="bundle.js"></script>
</body>
</html>
