services:
  livekit-server:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"   # HTTP/WebSocket
      - "7881:7881"   # RTC (TCP)
      - "7882:7882/udp" # RTC (UDP)
    volumes:
      - ./infra/livekit-server.yaml:/etc/livekit.yaml
    depends_on:
      - redis
    networks:
      - voiceagent

  sip-bridge:
    image: livekit/sip:latest
    environment:
      - SIP_PORT=5060
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    depends_on:
      - livekit-server
    networks:
      - voiceagent

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - AGENT_MAX_CONCURRENT_CALLS=${AGENT_MAX_CONCURRENT_CALLS:-20}
      - AGENT_WORKER_LOAD_THRESHOLD=${AGENT_WORKER_LOAD_THRESHOLD:-0.65}
    depends_on:
      - livekit-server
      - redis
      - chromadb
    deploy:
      replicas: ${AGENT_REPLICAS:-3}
    networks:
      - voiceagent

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "src.dashboard:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      - LIVEKIT_URL=ws://livekit-server:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - agent
    networks:
      - voiceagent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - voiceagent

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - voiceagent

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - agent
    networks:
      - voiceagent

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - voiceagent

volumes:
  redis-data:
  chroma-data:
  prometheus-data:
  grafana-data:

networks:
  voiceagent:
    driver: bridge
