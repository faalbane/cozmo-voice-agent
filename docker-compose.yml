services:
  # Voice agent server — handles concurrent calls via HTTP API
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"      # HTTP API (POST /calls, GET /calls, etc.)
      - "8765-8865:8765-8865"  # WebSocket ports for individual calls
      - "9100:9100"      # Prometheus metrics
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - METRICS_PORT=9100
    depends_on:
      - redis
      - chromadb
    networks:
      - voiceagent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - voiceagent

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - voiceagent

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - agent
    networks:
      - voiceagent

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - voiceagent

volumes:
  redis-data:
  chroma-data:
  prometheus-data:
  grafana-data:

networks:
  voiceagent:
    driver: bridge
